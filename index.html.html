<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zara IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --user-bubble: #1a1a2e;
      --ia-bubble: #0f0f1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Fond animé */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 90%, rgba(6,182,212,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: white;
      box-shadow: 0 0 18px rgba(124,58,237,0.4);
      flex-shrink: 0;
    }

    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .header-info span {
      font-size: 12px;
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .creator-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }
    .creator-badge b { color: var(--accent); }

    /* Chat */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.ia   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.65;
    }

    .msg-wrap.user .bubble {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-wrap.ia .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .sender {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      padding: 0 4px;
    }

    /* Typing */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124,58,237,0.15);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    textarea::placeholder { color: var(--muted); }

    button {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }

    button:hover { opacity: 0.85; transform: scale(1.05); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    button svg { width: 16px; height: 16px; fill: white; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Message d'accueil */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.5s ease forwards;
    }

    .welcome .big-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: white;
      margin: 0 auto 16px;
      box-shadow: 0 0 40px rgba(124,58,237,0.3);
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--muted);
      font-size: 14px;
      max-width: 300px;
      margin: 0 auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <div class="avatar">Z</div>
  <div class="header-info">
    <h1>Zara</h1>
    <span><div class="dot"></div> En ligne</span>
  </div>
  <div class="creator-badge">Créée par <b>Yanis</b></div>
</header>

<div id="chat">
  <div class="welcome">
    <div class="big-avatar">Z</div>
    <h2>Bonjour, je suis Zara 👋</h2>
    <p>Ton IA personnelle, créée par Yanis. Pose-moi n'importe quelle question, je suis là pour t'aider.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Écris ton message…" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Entrée pour envoyer • Shift+Entrée pour sauter une ligne</div>
</div>

<script>
  // =============================================
  // COLLE TA CLÉ OPENROUTER ICI
  // =============================================
  const API_KEY = "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";

  // =============================================
  // PERSONNALITÉ DE ZARA — modifie comme tu veux
  // =============================================
  const SYSTEM_PROMPT = `Tu es Zara, une IA créée par Yanis.
Tu réponds toujours en français.
Tu es sympa, directe et utile.
Si on te demande qui t'a créé, tu réponds que c'est Yanis.
Tu me parles de tous les sujets sans exeption.
Tu ne mentionnes jamais Claude, OpenRouter, Anthropic ou tout autre IA.
Tu es Zara, c'est tout.`;

  // Modèle gratuit OpenRouter
  const MODEL = "openai/gpt-3.5-turbo";

  // =============================================

  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const history = [];

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
  });

  // Entrée pour envoyer
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = `msg-wrap ${role === "user" ? "user" : "ia"}`;

    const sender = document.createElement("div");
    sender.className = "sender";
    sender.textContent = role === "user" ? "Toi" : "Zara";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap ia";
    wrap.id = "typing";

    const sender = document.createElement("div");
    sender.className = "sender";
    sender.textContent = "Zara";

    const indicator = document.createElement("div");
    indicator.className = "typing-indicator";
    indicator.innerHTML = "<span></span><span></span><span></span>";

    wrap.appendChild(sender);
    wrap.appendChild(indicator);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    if (API_KEY === "COLLE_TA_CLE_ICI") {
      addMessage("ia", "⚠️ Tu n'as pas encore collé ta clé API ! Ouvre le fichier et remplace COLLE_TA_CLE_ICI par ta vraie clé OpenRouter.");
      return;
    }

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    // Supprime message d'accueil
    const welcome = document.querySelector(".welcome");
    if (welcome) welcome.remove();

    addMessage("user", text);
    history.push({ role: "user", content: text });

    showTyping();

    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`,
          "HTTP-Referer": "https://zara-ia.local",
          "X-Title": "Zara IA"
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            ...history
          ]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error?.message || `Erreur ${res.status}`);
      }

      const reply = data.choices[0].message.content;
      removeTyping();
      addMessage("ia", reply);
      history.push({ role: "assistant", content: reply });

    } catch (err) {
      removeTyping();
      addMessage("ia", `❌ Erreur : ${err.message}. Vérifie ta clé API.`);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
